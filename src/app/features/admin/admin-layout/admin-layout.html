<div class="flex min-h-screen" style="background: var(--j-bg-base)">

  <!-- Sidebar -->
  <div class="w-56 flex flex-col flex-shrink-0"
       style="background: var(--j-bg-surface); border-right: 0.5px solid var(--j-border-accent)">

    <!-- Logo -->
    <div class="px-5 py-6" style="border-bottom: 0.5px solid var(--j-border-accent)">
      <div class="text-xl font-black tracking-tight" style="color: var(--j-text-primary)">
        Juara<span style="background: var(--j-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent">.in</span>
      </div>
      <div class="text-xs mt-0.5" style="color: var(--j-text-secondary)">Admin Panel</div>
    </div>

    <!-- Nav -->
    <nav class="flex flex-col gap-1 px-3 py-4 flex-1">

      <a routerLink="/admin/dashboard"
         routerLinkActive="active-nav"
         [routerLinkActiveOptions]="{ exact: true }"
         class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>

      <a routerLink="/admin/events"
         routerLinkActive="active-nav"
         [routerLinkActiveOptions]="{ exact: false }"
         class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Events
      </a>

    </nav>

    <!-- User info + logout -->
    <div class="px-3 py-4" style="border-top: 0.5px solid var(--j-border-accent)">
      <div class="flex items-center gap-3 px-3 py-2 mb-2">
        <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0"
             style="background: var(--j-purple-dark); color: var(--j-purple-text)">
          A
        </div>
        <div class="text-xs truncate" style="color: var(--j-text-secondary)">Admin</div>
      </div>
      <button class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium"
              [style.opacity]="isLoggingOut() ? '0.5' : '1'"
              (click)="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Keluar
      </button>
    </div>

  </div>

  <!-- Main content -->
  <div class="flex-1 overflow-auto">
    <router-outlet />
  </div>

</div>
